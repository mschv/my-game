<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Common Day</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }
  :root {
    --bg: #fdf6e8; --panel: #f5edd8; --panel2: #ece0c4;
    --border: #c8a86c; --border-dark: #9a7240;
    --text: #3a2810; --text-dim: #8a6840;
    --accent: #c8742a; --green: #5a9a5a; --pb: 3px;
  }
  body { background: var(--panel2); background-image: radial-gradient(circle at 20% 20%, rgba(255,220,140,0.35) 0%, transparent 60%), radial-gradient(circle at 80% 80%, rgba(200,160,80,0.2) 0%, transparent 50%); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: "DM Mono", monospace; padding: 24px 16px; }
  .game-outer { display: flex; flex-direction: column; align-items: center; width: 500px; max-width: 100%; }
  .game-wrapper { width: 100%; filter: drop-shadow(0 6px 32px rgba(100,60,10,0.22)); }
  .pixel-box { border: var(--pb) solid var(--border-dark); outline: var(--pb) solid var(--bg); outline-offset: calc(-1 * var(--pb)); box-shadow: 0 0 0 calc(var(--pb)*2) var(--border), inset 0 0 0 var(--pb) var(--panel2); position: relative; }
  .pixel-box::before, .pixel-box::after, .corner-tr, .corner-bl { content: ""; position: absolute; width: 7px; height: 7px; background: var(--accent); z-index: 10; }
  .pixel-box::before { top: -4px; left: -4px; }
  .pixel-box::after  { bottom: -4px; right: -4px; }
  .corner-tr { top: -4px; right: -4px; }
  .corner-bl { bottom: -4px; left: -4px; }
  .game-container { background: var(--bg); overflow: hidden; }
  .hud { background: var(--panel); border-bottom: var(--pb) solid var(--border); padding: 10px 16px 9px; display: flex; justify-content: space-between; align-items: center; position: relative; }
  .hud-stat { display: flex; flex-direction: column; gap: 5px; }
  .hud-label { font-family: "Press Start 2P", monospace; font-size: 7px; color: var(--text-dim); letter-spacing: 0.08em; }
  .stat-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .stat-bar-bg { width: 90px; height: 8px; background: var(--panel2); border: 1px solid var(--border); overflow: hidden; }
  .stat-bar-fill { height: 100%; transition: width 0.4s cubic-bezier(.34,1.1,.64,1); }
  .drive-fill { background: var(--accent); }
  .conn-fill  { background: var(--green); }
  .stat-val { font-family: "Press Start 2P", monospace; font-size: 7px; color: var(--text); min-width: 22px; text-align: right; }

  .scene-area { height: 280px; position: relative; overflow: hidden; background: #d8ccb0; border-top: var(--pb) solid var(--border); border-bottom: var(--pb) solid var(--border); }
  .scene-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.55s ease; }
  .scene-img.loaded { opacity: 1; }
  .scene-area::after { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(60,30,5,0.28) 100%), linear-gradient(to bottom, rgba(60,30,5,0.12) 0%, transparent 25%, transparent 75%, rgba(60,30,5,0.22) 100%); pointer-events: none; z-index: 1; }
  .dialogue-area { background: var(--bg); padding: 12px 18px 15px; min-height: 200px; }
  .dialogue-area::before { content: ""; display: block; height: 2px; background: repeating-linear-gradient(90deg, var(--border) 0px, var(--border) 4px, transparent 4px, transparent 8px); margin-bottom: 12px; opacity: 0.5; }
  .speaker-tag { display: inline-flex; align-items: center; gap: 6px; font-family: "Press Start 2P", monospace; font-size: 8px; color: var(--accent); margin-bottom: 10px; letter-spacing: 0.06em; min-height: 18px; }
  .speaker-tag::before { content: "\25B6"; font-size: 6px; color: var(--green); }
  .speaker-tag.italic-mode { color: var(--text-dim); }
  .speaker-tag.italic-mode::before { color: var(--border); content: "\25C6"; }
  .dialogue-text { font-family: "DM Mono", monospace; font-size: 13px; color: var(--text); line-height: 1.9; margin-bottom: 14px; min-height: 52px; }
  .dialogue-text.italic { font-style: italic; color: var(--text-dim); }
  .typing-cursor { display: inline-block; width: 8px; height: 2px; background: var(--accent); vertical-align: middle; margin-left: 2px; animation: cursor-blink 0.6s step-end infinite; }
  @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .choices { display: flex; flex-direction: column; gap: 7px; }
  .choice-btn { background: var(--panel); border: 2px solid var(--border); padding: 11px 14px 11px 22px; text-align: left; font-family: "DM Mono", monospace; font-size: 13px; color: var(--text); cursor: pointer; transition: background 0.1s, border-color 0.12s, color 0.1s; line-height: 1.5; position: relative; }
  .choice-btn::before { content: "\203A"; position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--border); font-size: 18px; line-height: 1; transition: color 0.1s, left 0.12s; }
  .choice-btn:hover { background: #fef8ec; border-color: var(--accent); color: var(--accent); }
  .choice-btn:hover::before { color: var(--accent); left: 11px; }
  .continue-btn { background: none; border: none; color: var(--text-dim); font-family: "Press Start 2P", monospace; font-size: 8px; cursor: pointer; padding: 6px 0; display: flex; align-items: center; gap: 8px; transition: color 0.15s; letter-spacing: 0.06em; }
  .continue-btn:hover { color: var(--accent); }
  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .stat-notif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--panel); color: var(--accent); padding: 8px 20px; border: 2px solid var(--border-dark); box-shadow: 3px 3px 0 var(--border-dark); font-family: "Press Start 2P", monospace; font-size: 8px; pointer-events: none; opacity: 0; transition: opacity 0.25s; z-index: 999; white-space: nowrap; letter-spacing: 0.06em; }
  .stat-notif.show { opacity: 1; }
  .special-screen { text-align: center; padding: 18px 14px 8px; }
  .special-screen .s-title { font-family: "Press Start 2P", monospace; font-size: 9px; color: var(--accent); margin-bottom: 18px; line-height: 2; letter-spacing: 0.08em; }
  .special-screen .s-body { font-family: "DM Mono", monospace; font-size: 13px; color: var(--text); line-height: 1.9; margin-bottom: 8px; }
  .special-screen .s-bold { font-family: "DM Mono", monospace; font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.9; margin-bottom: 6px; }
  .special-screen .s-stats { font-family: "DM Mono", monospace; font-size: 12px; color: var(--text-dim); margin: 14px 0 12px; line-height: 1.6; }
  .special-screen .s-final { font-family: "DM Mono", monospace; font-size: 12px; color: var(--accent); font-style: italic; margin-bottom: 20px; line-height: 1.7; }
  .restart-btn { background: var(--panel); color: var(--accent); border: 2px solid var(--accent); box-shadow: 3px 3px 0 var(--border-dark); padding: 10px 20px; font-family: "Press Start 2P", monospace; font-size: 8px; cursor: pointer; letter-spacing: 0.08em; transition: background 0.12s, color 0.12s, box-shadow 0.12s, transform 0.12s; }
  .restart-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 1px 1px 0 var(--border-dark); transform: translate(2px,2px); }
  .start-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 24px 20px; text-align: center; }
  .start-title { font-family: "Press Start 2P", monospace; font-size: 11px; color: var(--text); letter-spacing: 0.1em; line-height: 2.2; margin-bottom: 10px; }
  .start-subtitle { font-family: "DM Mono", monospace; font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 22px; line-height: 1.8; }
  .start-divider { width: 60px; height: 2px; background: repeating-linear-gradient(90deg, var(--border) 0px, var(--border) 4px, transparent 4px, transparent 8px); margin: 0 auto 28px; }
  .start-stats { font-family: "Press Start 2P", monospace; font-size: 7px; color: var(--text-dim); line-height: 2.8; margin-bottom: 28px; text-align: left; display: inline-block; }
  .start-stats span { color: var(--accent); }
  .start-stats span.g { color: var(--green); }
  .start-btn { background: var(--panel); color: var(--accent); border: 2px solid var(--accent); box-shadow: 3px 3px 0 var(--border-dark); padding: 12px 28px; font-family: "Press Start 2P", monospace; font-size: 9px; cursor: pointer; letter-spacing: 0.08em; transition: background 0.12s, color 0.12s, box-shadow 0.12s, transform 0.12s; }
  .start-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 1px 1px 0 var(--border-dark); transform: translate(2px,2px); }
</style>
</head>
<body>

<div class="game-outer">

      </div>

</div>
<script>
const IMGS = {"bedroom": "game_images/image_14.png", "hallway": "game_images/image_03.png", "outside": "game_images/image_02.png", "coffee": "game_images/image_10.png", "busstop": "game_images/image_07.png", "bus": "game_images/image_09.png", "walk": "game_images/image_11.png", "coworkers": "game_images/image_05.png", "presentation": "game_images/image_06.png", "officework": "game_images/image_01.png", "afternoon": "game_images/image_12.png", "afternoonbus": "game_images/image_08.png", "night": "game_images/image_13.png", "nightbus": "game_images/image_04.png"};
const NODES = {"s1": {"img": "bedroom", "music": "morning", "lines": [{"speaker": "ALEX", "text": "8:14 AM.", "italic": true}], "choices": [{"text": "\"Okay. Ready to go.\"", "drive": 10, "conn": 0, "next": "s2"}, {"text": "\"I wish I had 5 more minutes to sleep.\"", "drive": -10, "conn": 10, "next": "s2"}]}, "s2": {"img": "hallway", "music": "morning", "lines": [{"speaker": "NEIGHBOR", "text": "Morning, Alex. How are you doing?"}, {"speaker": "ALEX", "text": "Morning. Cold day?"}, {"speaker": "NEIGHBOR", "text": "Haven't been out yet. I always just assume the worst and layer up."}], "choices": [{"text": "\"New lamp?\"", "drive": 0, "conn": 10, "next": "s2a"}, {"text": "\"Have to run, but have a nice day!\"", "drive": 10, "conn": -10, "next": "s2b"}]}, "s2a": {"img": "hallway", "music": "morning", "lines": [{"speaker": "NEIGHBOR", "text": "Flea market on Sunday. You should go sometime, they always have nice things."}, {"speaker": "ALEX", "text": "Maybe this weekend."}, {"speaker": "NEIGHBOR", "text": "You say that! Have a good day."}], "next": "s3"}, "s2b": {"img": "hallway", "music": "morning", "lines": [{"speaker": "NEIGHBOR", "text": "You too Alex!"}], "next": "s3"}, "s3": {"img": "outside", "music": "morning", "lines": [{"speaker": "ALEX", "text": "Confusing day, it is sunny but cold. Really just want that coffee.", "italic": true}], "next": "s4"}, "s4": {"img": "coffee", "music": "morning", "lines": [{"speaker": "JESS", "text": "The usual?"}, {"speaker": "ALEX", "text": "Please."}, {"speaker": "JESS", "text": "How's the week?"}], "choices": [{"text": "\"Good! Busy, but good.\"", "drive": 10, "conn": 0, "next": "s4b"}, {"text": "\"It's only Tuesday.\"", "drive": 0, "conn": 10, "next": "s4b"}]}, "s4b": {"img": "coffee", "music": "morning", "lines": [{"speaker": "JESS", "text": "Fair. Hey \u2014 you're one stamp away from a free coffee by the way."}], "choices": [{"text": "\"Oh nice! This place kind of has me hooked.\"", "drive": 0, "conn": 10, "next": "s4c_a"}, {"text": "\"Honestly it's the only thing getting me through the morning.\"", "drive": -10, "conn": 10, "next": "s4c_b"}]}, "s4c_a": {"img": "coffee", "music": "morning", "lines": [{"speaker": "JESS", "text": "Happy to hear it. Have a good one!"}, {"speaker": "ALEX", "text": "You too."}], "next": "s5"}, "s4c_b": {"img": "coffee", "music": "morning", "lines": [{"speaker": "JESS", "text": "Don't let it get to that. Have a good day, Alex."}, {"speaker": "ALEX", "text": "Ha \u2014 I'll try. See you tomorrow."}], "next": "s5"}, "s5": {"img": "busstop", "music": "morning", "lines": [{"speaker": "OLD MAN", "text": "Two minutes, I think."}, {"speaker": "ALEX", "text": "Thanks."}, {"speaker": "OLD MAN", "text": "You work around here?"}], "choices": [{"text": "\"Little further. Innovate Corp \u2014 the glass building on 5th.\"", "drive": 10, "conn": 10, "next": "s5a"}, {"text": "\"Yes. I like that I don't lose half my day commuting.\"", "drive": 10, "conn": -10, "next": "s5b"}]}, "s5a": {"img": "busstop", "music": "morning", "lines": [{"speaker": "OLD MAN", "text": "I used to work there. Good company."}, {"speaker": "ALEX", "text": "Can't complain."}], "next": "s6"}, "s5b": {"img": "busstop", "music": "morning", "lines": [{"speaker": "OLD MAN", "text": "When I was younger, I thought the same way. But there's something about being on the bus. You see things."}, {"speaker": "ALEX", "text": "I guess so."}], "next": "s6"}, "s6": {"img": "bus", "music": "morning", "lines": [{"speaker": "SOPHIA", "text": "Alex! Oh my god. Do you always take this bus?"}, {"speaker": "ALEX", "text": "I do actually. What are you doing on here?"}, {"speaker": "SOPHIA", "text": "Ceramics class. Don't laugh."}], "choices": [{"text": "\"Why would I laugh? That's amazing.\"", "drive": 0, "conn": 10, "next": "s6b"}, {"text": "\"Ceramics. I would not have guessed that.\"", "drive": 0, "conn": -10, "next": "s6b"}]}, "s6b": {"img": "bus", "music": "morning", "lines": [{"speaker": "SOPHIA", "text": "It's very calming and I'm terrible at it and I genuinely love it. How are you? What's going on?"}, {"speaker": "ALEX", "text": "Nothing much. Normal week."}, {"speaker": "SOPHIA", "text": "Yeah? Work okay?"}], "choices": [{"text": "\"Yeah, all good.\"", "drive": 10, "conn": -10, "next": "s6c_a"}, {"text": "\"Same as usual, you know.\"", "drive": -10, "conn": 10, "next": "s6c_b"}]}, "s6c_a": {"img": "bus", "music": "morning", "lines": [{"speaker": "SOPHIA", "text": "Good! We should actually hang out soon. Properly, not just talking about it."}, {"speaker": "ALEX", "text": "Yes, definitely. I'll reach out."}, {"speaker": "SOPHIA", "text": "You always say that."}], "next": "s7"}, "s6c_b": {"img": "bus", "music": "morning", "lines": [{"speaker": "SOPHIA", "text": "Well, you know where I am. I'm always around."}, {"speaker": "ALEX", "text": "Oh, thanks."}], "next": "s7"}, "s7": {"img": "walk", "music": "morning", "lines": [{"speaker": "ALEX", "text": "I love arriving early; it is always so calm.", "italic": true}], "next": "s8"}, "s8": {"img": "coworkers", "music": "office", "lines": [{"speaker": "DOM", "text": "Morning! Did you eat breakfast?"}, {"speaker": "ALEX", "text": "Coffee counts."}, {"speaker": "DOM", "text": "It does not count. I have a granola bar \u2014 it's the good kind, not the sad kind."}], "choices": [{"text": "\"I'm okay, thanks.\"", "drive": 10, "conn": -10, "next": "s8b"}, {"text": "\"I might take you up on that later actually.\"", "drive": 0, "conn": 10, "next": "s8b"}]}, "s8b": {"img": "coworkers", "music": "office", "lines": [{"speaker": "PRIYA", "text": "Ready for today?"}, {"speaker": "ALEX", "text": "It's just the quarterly thing."}, {"speaker": "PRIYA", "text": "You've been prepping for two weeks though."}], "choices": [{"text": "\"You know how I am.\"", "drive": 10, "conn": -10, "next": "s8c_a"}, {"text": "\"Has it been two weeks? It didn't really feel like it.\"", "drive": -10, "conn": 20, "next": "s8c_b"}]}, "s8c_a": {"img": "coworkers", "music": "office", "lines": [{"speaker": "DOM", "text": "You'll be fine. You know the material."}], "next": "s9"}, "s8c_b": {"img": "coworkers", "music": "office", "lines": [{"speaker": "DOM", "text": "I don't know how you do it. You're always so prepared, and you make it look easy."}], "next": "s9"}, "s9": {"img": "presentation", "music": "office", "lines": [{"speaker": "BOSS", "text": "Alex, that was excellent. Honestly the best one yet."}, {"speaker": "MAYA", "text": "The client is going to be really impressed. Great work."}], "choices": [{"text": "\"Thank you! I really love what I do.\"", "drive": 10, "conn": 0, "next": "s10"}, {"text": "\"It was a lot of work, but I'm happy with how it came together.\"", "drive": 10, "conn": 10, "next": "s10"}]}, "s10": {"img": "officework", "music": "office", "lines": [{"speaker": "ALEX", "text": "Oh. A note.", "italic": true}, {"speaker": "", "text": "\"Alex \u2014 we're really proud of your work lately. The team and I have decided you're getting a promotion. Let's talk tomorrow. P.S. don't forget to send me the final version of the report by tomorrow, 10am.\"", "italic": true}, {"speaker": "ALEX", "text": "\u2026 Wow", "italic": true}], "choices": [{"text": "\"I think I deserve to go home early today.\"", "drive": -10, "conn": 10, "next": "s11a"}, {"text": "\"I should get the report done before I leave.\"", "drive": 10, "conn": -10, "next": "s11b"}]}, "s11a": {"img": "afternoon", "music": "morning", "lines": [{"speaker": "ALEX", "text": "What a day!", "italic": true}], "next": "s12a"}, "s12a": {"img": "afternoonbus", "music": "morning", "lines": [], "choices": [{"text": "(calls Sophia) \"Just got some really good news. Celebrate this weekend?\"", "drive": 10, "conn": 10, "next": "end"}, {"text": "I'm going to be so much busier now.", "drive": -10, "conn": -10, "next": "end"}]}, "s11b": {"img": "night", "music": "night", "lines": [{"speaker": "ALEX", "text": "What a day.", "italic": true}], "next": "s12b"}, "s12b": {"img": "nightbus", "music": "night", "lines": [], "choices": [{"text": "I didn't even realize it had gotten that late.", "drive": -10, "conn": 10, "next": "end"}, {"text": "At least I can go in a bit later tomorrow.", "drive": 10, "conn": -10, "next": "end"}]}};

const state = { drive: 50, conn: 50 };
let typingTimer = null;

const Music = (function() {
  let ctx, masterGain, currentMood = null, nodes = [], loopTimer = null, muted = false;
  const MOODS = {
    morning: { bpm:72, root:48, vol:0.36, filterFreq:1800, reverb:0.35, swing:0.62, chords:[[0,4,7,11],[5,9,12,16],[3,7,10,14],[7,11,14,17]], bass:[0,5,3,7] },
    office:  { bpm:65, root:45, vol:0.28, filterFreq:1200, reverb:0.5,  swing:0.58, chords:[[0,3,7,10],[5,8,12,15],[8,12,15,19],[3,7,10,14]], bass:[0,5,8,3] },
    night:   { bpm:58, root:43, vol:0.24, filterFreq:900,  reverb:0.7,  swing:0.55, chords:[[0,3,7,10],[8,11,15,18],[5,8,12,15],[2,5,9,12]], bass:[0,8,5,2] }
  };
  function hz(m){ return 440*Math.pow(2,(m-69)/12); }
  function makeRev(s,d){
    const c=ctx.createConvolver(),len=ctx.sampleRate*s,buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let i=0;i<2;i++){const dt=buf.getChannelData(i);for(let j=0;j<len;j++)dt[j]=(Math.random()*2-1)*Math.pow(1-j/len,d);}
    c.buffer=buf;return c;
  }
  function note(f,t,dur,vol,type,det){
    type=type||"sine";det=det||0;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.value=f;o.detune.value=det;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.02);

    o.connect(g);o.start(t);o.stop(t+dur+0.05);nodes.push(o,g);return g;
  }
  function noise(t,dur,vol,lo,hi){
    const len=Math.ceil(ctx.sampleRate*dur),buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
    const s=ctx.createBufferSource();s.buffer=buf;
    const g=ctx.createGain(),f=ctx.createBiquadFilter();
    f.type="bandpass";f.frequency.value=(lo+hi)/2;f.Q.value=0.8;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    s.connect(f);f.connect(g);g.connect(masterGain);s.start(t);s.stop(t+dur+0.02);nodes.push(s,g,f);
  }
  function scheduleBar(mood,barStart,barNum){
    if(currentMood!==mood)return;
    const m=MOODS[mood],beat=60/m.bpm,b=beat*4,ci=barNum%m.chords.length;
    const chord=m.chords[ci],bassRoot=m.bass[ci],root=m.root,sw=m.swing;
    const rev=makeRev(2.2,3),flt=ctx.createBiquadFilter();
    flt.type="lowpass";flt.frequency.value=m.filterFreq;flt.Q.value=0.7;
    const dry=ctx.createGain(),wet=ctx.createGain();
    dry.gain.value=0.7;wet.gain.value=m.reverb;
    flt.connect(dry);flt.connect(rev);rev.connect(wet);dry.connect(masterGain);wet.connect(masterGain);

    function send(g){g.connect(flt);}
    send(note(hz(root+bassRoot-12),barStart,b*0.92,0.5,"sine"));
    send(note(hz(root+bassRoot-12),barStart,b*0.92,0.18,"triangle",7));
    [0,beat*2].forEach(function(off,bi){
      const t=barStart+off+(bi?(sw-0.5)*beat*0.15:0);
      chord.forEach(function(s,i){
        const det=(Math.random()-0.5)*10;
        send(note(hz(root+s+(i<2?-12:0)),t,beat*1.7,0.10-i*0.012,"triangle",det));
        send(note(hz(root+s+(i<2?-12:0)),t,beat*2.0,0.05,"sine",det*0.4));
      });
    });
    for(let i=0;i<8;i++)noise(barStart+i*beat*0.5+(i%2===1?(sw-0.5)*beat:0),0.035,i%2===0?0.036:0.020,5000,12000);
    [[0,0.42],[beat*2,0.20]].forEach(function(p){
      const t=barStart+p[0],k=ctx.createOscillator(),kg=ctx.createGain();
      k.frequency.setValueAtTime(140,t);k.frequency.exponentialRampToValueAtTime(38,t+0.12);
      kg.gain.setValueAtTime(p[1],t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      k.connect(kg);kg.connect(masterGain);k.start(t);k.stop(t+0.2);nodes.push(k,kg);
    });
    [beat,beat*3].forEach(function(off){noise(barStart+off+(sw-0.5)*beat*0.08,0.075,0.09,800,4000);});
    if(Math.random()>0.45){
      const ms=chord[Math.floor(Math.random()*chord.length)],mt=barStart+Math.floor(Math.random()*4)*beat;
      send(note(hz(root+ms+12),mt,beat*(0.4+Math.random()*0.6),0.07,"sine"));
    }
    loopTimer=setTimeout(function(){scheduleBar(mood,barStart+b,barNum+1);},(b*0.75)*1000);
  }
  function play(mood){
    if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();masterGain=ctx.createGain();masterGain.gain.value=0;masterGain.connect(ctx.destination);}
    if(ctx.state==="suspended")ctx.resume();
    if(currentMood===mood)return;
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value,ctx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.2);
    clearTimeout(loopTimer);
    setTimeout(function(){
      nodes.forEach(function(n){try{if(n.stop)n.stop();else n.disconnect();}catch(e){}});nodes=[];
      currentMood=mood;if(muted)return;
      masterGain.gain.setValueAtTime(0,ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(MOODS[mood].vol,ctx.currentTime+1.8);
      scheduleBar(mood,ctx.currentTime+0.05,0);
    },1300);
  }
  function toggleMute(){
    muted=!muted;if(!ctx)return muted;
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value,ctx.currentTime);
    if(muted)masterGain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.5);
    else masterGain.gain.linearRampToValueAtTime(MOODS[currentMood]?MOODS[currentMood].vol:0.3,ctx.currentTime+0.8);
    return muted;
  }
  return {play:play,toggleMute:toggleMute};
})();

function updateHUD(){
  document.getElementById("driveBar").style.width=state.drive+"%";
  document.getElementById("driveVal").textContent=state.drive;
  document.getElementById("connBar").style.width=state.conn+"%";
  document.getElementById("connVal").textContent=state.conn;
}
function showNotif(msg){
  if(!msg)return;
  const el=document.getElementById("statNotif");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove("show");},2400);
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function applyStats(drive,conn){
  const dd=drive||0,dc=conn||0;
  state.drive=clamp(state.drive+dd,0,100);
  state.conn=clamp(state.conn+dc,0,100);
  updateHUD();
  const parts=[];
  if(dd>0)parts.push("Drive +"+dd);
  if(dd<0)parts.push("Drive "+dd);
  if(dc>0)parts.push("Connection +"+dc);
  if(dc<0)parts.push("Connection "+dc);
  if(parts.length)showNotif(parts.join("   "));
  return checkGameOver();
}
function checkGameOver(){
  const d=state.drive===0,c=state.conn===0;
  if(d&&c)return "gameover_C";
  if(d)return "gameover_A";
  if(c)return "gameover_B";
  return null;
}
function typeText(el,text,italic,speed,onDone){
  if(typingTimer)clearInterval(typingTimer);
  el.className="dialogue-text"+(italic?" italic":"");
  el.innerHTML="";let i=0;
  const cur=document.createElement("span");cur.className="typing-cursor";el.appendChild(cur);
  typingTimer=setInterval(function(){
    if(i>=text.length){clearInterval(typingTimer);typingTimer=null;cur.remove();if(onDone)onDone();return;}
    cur.insertAdjacentText("beforebegin",text[i++]);
  },speed);
}
function showGameOver(type){
  Music.play("night");
  const img=document.getElementById("sceneImg");
  img.classList.remove("loaded");img.src=IMGS["nightbus"];img.onload=function(){img.classList.add("loaded");};
  document.getElementById("speakerTag").style.display="none";
  document.getElementById("dialogueText").style.display="none";
  const screens={
    gameover_A:{title:"GAME OVER",body:"The day keeps going around you. You're just not sure you're in it anymore.",bold:"Alex lost the plot — not all at once, just gradually, and then completely."},
    gameover_B:{title:"GAME OVER",body:"Everything is on track.",bold:"You just can't think of a single person you'd want to tell that to.",extra:"Alex made it through the day alone. Every single part of it."},
    gameover_C:{title:"GAME OVER",body:"Oh.",bold:"..."}
  };
  const s=screens[type];
  document.getElementById("choicesArea").innerHTML=
    "<div class='special-screen'>"+
    "<div class='s-title'>"+s.title+"</div>"+
    "<div class='s-body'>"+s.body+"</div>"+
    "<div class='s-bold'>"+s.bold+"</div>"+
    (s.extra?"<div class='s-body'>"+s.extra+"</div>":"")+
    "<br><button class='restart-btn' onclick='restartGame()'>[ Try again? ]</button>"+
    "</div>";
}
function showEndScreen(){
  const d=state.drive,c=state.conn;
  let title,body,final;
  if(d>70&&c>70){
    title="You got home.";
    body="The note is still in your bag. You are meeting Sophia on Saturday. You have things to do tomorrow and people to do them for.<br><br>Some days it all lines up.";
    final="You're doing well. Make sure you mean it.";
  } else if(d>70&&c<40){
    title="You got home.";
    body="The day went well, by most measures. You were prepared, you delivered, you're moving forward.<br><br>The apartment is quiet.";
    final="You know where you're going. Do you know who's coming with you?";
  } else if(d<40&&c>70){
    title="You got home.";
    body="You talked to people today. Really talked. The neighbor, Sophia, maybe someone on the bus.<br><br>You're not sure what tomorrow is supposed to look like.";
    final="You're not alone. That's not nothing. But it's not everything either.";
  } else if(d<40&&c<40){
    title="You got home.";
    body="The day happened. You were there for most of it.";
    final="Tomorrow is another day.";
  } else if(d>=45&&d<=55&&c>=45&&c<=55){
    title="You got home.";
    body="Nothing shifted much. Maybe that was the point. Maybe not.";
    final="Exactly where you started. Is that stability or something else?";
  } else if(c>70&&d>=40&&d<=70){
    title="You got home.";
    body="The neighbor's lamp was on when you passed the door. The day felt like it had people in it.";
    final="You're good at being present. Don't forget to show up for yourself too.";
  } else {
    title="You got home.";
    body="The promotion note is saved. The report is either done or scheduled. Tomorrow has a shape.";
    final="You're good at moving forward. Just make sure you're not leaving anything behind.";
  }
  const img=document.getElementById("sceneImg");
  img.classList.remove("loaded");img.src=IMGS["bedroom"];img.onload=function(){img.classList.add("loaded");};
  Music.play("morning");
  document.getElementById("speakerTag").style.display="none";
  document.getElementById("dialogueText").style.display="none";
  document.getElementById("choicesArea").innerHTML=
    "<div class='special-screen'>"+
    "<div class='s-title'>"+title+"</div>"+
    "<div class='s-body'>"+body+"</div>"+
    "<div class='s-stats'>drive " + d + " &nbsp;·&nbsp; connection " + c + "</div>"+
    "<div class='s-final'>"+final+"</div>"+
    "<button class='restart-btn' onclick='restartGame()'>[ Play again ]</button>"+
    "</div>";
}
function showStartScreen(){
  const img=document.getElementById("sceneImg");
  img.classList.remove("loaded");img.src=IMGS["bedroom"];img.onload=function(){img.classList.add("loaded");};
  if(img.complete&&img.src)img.classList.add("loaded");
  document.getElementById("speakerTag").style.display="none";
  document.getElementById("dialogueText").style.display="none";
  document.getElementById("choicesArea").innerHTML=
    "<div class=\"start-screen\">"+
    "<div class=\"start-title\">A COMMON DAY</div>"+
    "<div class=\"start-subtitle\">Every choice shapes who you are<br>by the time you get home.</div>"+
    "<button class=\"start-btn\" onclick=\"startGame()\">[ START ]</button>"+
    "</div>";
}

function startGame(){
  state.drive=50;state.conn=50;
  updateHUD();
  document.getElementById("speakerTag").style.display="";
  document.getElementById("dialogueText").style.display="";
  renderNode("s1");
  Music.play("morning");
}

function renderNode(id){
  if(id==="gameover_A"||id==="gameover_B"||id==="gameover_C"){showGameOver(id);return;}
  if(id==="end"){showEndScreen();return;}
  const node=NODES[id];if(!node)return;
  const img=document.getElementById("sceneImg");
  img.classList.remove("loaded");
  img.src=IMGS[node.img]||"";
  img.onload=function(){img.classList.add("loaded");};
  if(img.complete&&img.src)img.classList.add("loaded");
  if(node.music)Music.play(node.music);
  const speakerEl=document.getElementById("speakerTag");
  const textEl=document.getElementById("dialogueText");
  const choicesEl=document.getElementById("choicesArea");
  speakerEl.style.display="";
  textEl.style.display="";
  choicesEl.innerHTML="";
  const lines=node.lines||[];
  function showLine(idx){
    if(idx>=lines.length){showControls();return;}
    const line=lines[idx];
    speakerEl.textContent=line.speaker||"";
    speakerEl.className="speaker-tag"+(line.italic?" italic-mode":"");
    choicesEl.innerHTML="";
    typeText(textEl,line.text,line.italic||false,26,function(){
      const btn=document.createElement("button");
      btn.className="continue-btn";
      btn.innerHTML="CONTINUE <span class='blink'>&#9658;</span>";
      btn.onclick=function(){showLine(idx+1);};
      choicesEl.appendChild(btn);
    });
  }
  function showControls(){
    choicesEl.innerHTML="";
    if(node.choices){
      if(!lines.length){
        speakerEl.textContent="ALEX";
        speakerEl.className="speaker-tag italic-mode";
        textEl.className="dialogue-text italic";
        textEl.textContent="...";
      }
      node.choices.forEach(function(c){
        const btn=document.createElement("button");
        btn.className="choice-btn";btn.textContent=c.text;
        btn.onclick=function(){
          const go=applyStats(c.drive||0,c.conn||0);
          renderNode(go||c.next);
        };
        choicesEl.appendChild(btn);
      });
    } else if(node.next){
      const btn=document.createElement("button");
      btn.className="continue-btn";
      btn.innerHTML="CONTINUE <span class='blink'>&#9658;</span>";
      btn.onclick=function(){renderNode(node.next);};
      choicesEl.appendChild(btn);
    }
  }
  showLine(0);
}
function restartGame(){
  state.drive=50;state.conn=50;
  updateHUD();
  showStartScreen();
}

updateHUD();
showStartScreen();
document.addEventListener("click",function unlock(){
  Music.play("morning");
  document.removeEventListener("click",unlock);
},{once:true});

</script>
</body>
